<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Brainrot Simulator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #1b1f3a, #0b0d16);
  color: white;
}

/* TOP BAR estilo Roblox */
.topbar {
  background: #111428;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
  color: #00ffd5;
  box-shadow: 0 0 10px black;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: auto;
}

.card {
  background: #161a2f;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,255,213,0.2);
  margin-top: 15px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
  outline: none;
}

.traits {
  margin-top: 10px;
}

.traits label {
  display: block;
  background: #1f2442;
  padding: 8px;
  margin-top: 6px;
  border-radius: 8px;
  cursor: pointer;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: #00ffd5;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #00c7a8;
}

.result {
  margin-top: 15px;
  background: #11152a;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,255,213,0.1);
}
</style>
</head>

<body>

<div class="topbar">
🧠 Brainrot Simulator
</div>

<div class="container">

<div class="card">
  <h3>Nome do Brainrot</h3>
  <input type="text" id="name" placeholder="Ex: Shadow Brain">
</div>

<div class="card">
  <h3>Traits</h3>

  <div class="traits">
    <label><input type="checkbox" value="5"> Speed +5</label>
    <label><input type="checkbox" value="10"> Power +10</label>
    <label><input type="checkbox" value="20"> Diamond +20</label>
    <label><input type="checkbox" value="50"> OG Boost +50</label>
  </div>

  <button onclick="calcular()">CALCULAR 💰</button>
</div>

<div id="resultado"></div>

</div>

<script>

function calcular() {

  const nome = document.getElementById("name").value || "Sem nome";

  const checks = document.querySelectorAll("input[type='checkbox']");

  let bonus = 0;

  checks.forEach(c => {
    if (c.checked) bonus += Number(c.value);
  });

  const base = 10;
  const total = base + bonus;

  document.getElementById("resultado").innerHTML = `
    <div class="result">
      <h2>🧠 ${nome}</h2>
      <p>💵 Base: ${base} coins/sec</p>
      <p>⚡ Bonus Traits: +${bonus}</p>
      <h2>💰 Total: ${total} coins/sec</h2>
    </div>
  `;
}

</script>

</body>
</html>
