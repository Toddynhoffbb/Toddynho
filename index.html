<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>MyVideo</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* topo estilo YouTube */
.topbar {
  background: #202020;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
  color: white;
}

/* layout */
.container {
  display: flex;
}

/* lista lateral */
.sidebar {
  width: 30%;
  background: #181818;
  height: calc(100vh - 50px);
  overflow-y: auto;
  padding: 10px;
}

.video-item {
  background: #2a2a2a;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.video-item:hover {
  background: #3a3a3a;
}

/* player */
.main {
  flex: 1;
  padding: 20px;
}

iframe {
  width: 100%;
  height: 400px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="topbar">
📺 MyVideo
</div>

<div class="container">

  <div class="sidebar">
    <div class="video-item" onclick="play('dQw4w9WgXcQ')">
      🎬 Video 1
    </div>

    <div class="video-item" onclick="play('kxopViU98Xo')">
      🎬 Video 2
    </div>

    <div class="video-item" onclick="play('3JZ_D3ELwOQ')">
      🎬 Video 3
    </div>
  </div>

  <div class="main">
    <h2>Assista seus vídeos</h2>

    <iframe id="player"
      src="https://www.youtube.com/embed/dQw4w9WgXcQ"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>

</div>

<script>
function play(id) {
  document.getElementById("player").src =
    "https://www.youtube.com/embed/" + id;
}
</script>

</body>
</html>
