<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #2b0000, #0a0000);
  font-family: Arial;
  color: white;
}

.box {
  background: #1a0000;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  box-shadow: 0 0 20px red;
}

h2 {
  text-align: center;
  color: #ff2b2b;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  margin-bottom: 15px;
  border: none;
  border-radius: 8px;
  outline: none;
  background: #2a0000;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: red;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: darkred;
}

label {
  font-size: 14px;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔴 LOGIN</h2>

  <label>Username</label>
  <input type="text" placeholder="Insira texto">

  <label>Password</label>
  <input type="password" placeholder="Insira texto">

  <button>ENTRAR</button>
</div>

</body>
</html>
