<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GD Mobile</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #05050a;
  touch-action: none;
  font-family: Arial;
}

/* tela do jogo */
#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: linear-gradient(#101020, #000);
}

/* chão */
#ground {
  position: absolute;
  bottom: 15vh;
  width: 200%;
  height: 4px;
  background: #444;
}

/* player (cube neon estilo GD) */
#player {
  width: 6vh;
  height: 6vh;
  background: linear-gradient(45deg, #00ffd5, #0077ff);
  position: absolute;
  left: 10vw;
  bottom: 20vh;
  border-radius: 6px;
  box-shadow: 0 0 20px #00ffd5;
}

/* spikes */
.spike {
  width: 0;
  height: 0;
  border-left: 2.5vh solid transparent;
  border-right: 2.5vh solid transparent;
  border-bottom: 5vh solid #ff2b2b;
  position: absolute;
  bottom: 15vh;
  filter: drop-shadow(0 0 8px red);
}

/* score */
#score {
  position: absolute;
  top: 3vh;
  left: 3vw;
  color: white;
  font-size: 2vh;
}
</style>
</head>

<body>

<div id="game">
  <div id="score">Score: 0</div>
  <div id="player"></div>
  <div id="ground"></div>
</div>

<script>

const player = document.getElementById("player");
const game = document.getElementById("game");

let y = 20;
let velocity = 0;
let gravity = 0.7;
let jumping = false;

let speed = 6;
let score = 0;
let gameOver = false;

let spikes = [];

/* pulo (TOQUE + SPACE) */
function jump() {
  if (jumping) return;
  velocity = 12;
  jumping = true;
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});

document.addEventListener("touchstart", jump);

/* física */
function updatePlayer() {
  velocity -= gravity;
  y += velocity;

  if (y <= 20) {
    y = 20;
    velocity = 0;
    jumping = false;
  }

  player.style.bottom = y + "vh";
}

/* criar spikes */
function createSpike(x) {
  const spike = document.createElement("div");
  spike.classList.add("spike");
  spike.style.left = x + "vw";
  game.appendChild(spike);

  spikes.push({ el: spike, x: x });
}

/* mapa */
for (let i = 60; i < 300; i += 20) {
  createSpike(i);
}

/* loop do mundo */
function updateWorld() {
  if (gameOver) return;

  score++;
  document.getElementById("score").innerText = "Score: " + score;

  spikes.forEach(s => {
    s.x -= 0.6;
    s.el.style.left = s.x + "vw";

    // colisão simples adaptada mobile
    if (s.x < 18 && s.x > 10 && y < 25) {
      endGame();
    }
  });
}

/* game over */
function endGame() {
  gameOver = true;
  alert("💀 Game Over! Score: " + score);
  location.reload();
}

/* loops */
setInterval(updatePlayer, 16);
setInterval(updateWorld, 16);

</script>

</body>
</html>
