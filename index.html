<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Geometry Dash Lite</title>

<style>
body {
  margin: 0;
  background: #0b0b0f;
  overflow: hidden;
  font-family: Arial;
  color: white;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: linear-gradient(#111, #000);
}

/* player */
#player {
  width: 40px;
  height: 40px;
  background: #00ffcc;
  position: absolute;
  bottom: 100px;
  left: 100px;
  border-radius: 6px;
  box-shadow: 0 0 15px #00ffcc;
}

/* obstacle */
.obstacle {
  width: 40px;
  height: 40px;
  background: red;
  position: absolute;
  bottom: 100px;
  right: -50px;
  box-shadow: 0 0 10px red;
}

/* ground */
#ground {
  position: absolute;
  bottom: 100px;
  width: 100%;
  height: 2px;
  background: #444;
}

#score {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 20px;
}
</style>
</head>

<body>

<div id="game">
  <div id="score">Score: 0</div>
  <div id="player"></div>
  <div id="ground"></div>
</div>

<script>

const player = document.getElementById("player");
const game = document.getElementById("game");

let isJumping = false;
let gravity = 0.6;
let velocity = 0;
let position = 100;

let score = 0;
let gameOver = false;

/* pulo */
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") jump();
});

function jump() {
  if (isJumping) return;
  velocity = 12;
  isJumping = true;
}

/* física do player */
function updatePlayer() {
  velocity -= gravity;
  position += velocity;

  if (position <= 100) {
    position = 100;
    isJumping = false;
  }

  player.style.bottom = position + "px";
}

/* criar obstáculos */
function createObstacle() {
  if (gameOver) return;

  const obs = document.createElement("div");
  obs.classList.add("obstacle");
  game.appendChild(obs);

  let right = -50;

  function move() {
    if (gameOver) return;

    right += 5;
    obs.style.right = right + "px";

    /* colisão */
    if (
      right > window.innerWidth - 140 &&
      right < window.innerWidth - 80 &&
      position < 140
    ) {
      endGame();
    }

    if (right > window.innerWidth + 50) {
      obs.remove();
    }
  }

  let interval = setInterval(move, 20);
}

/* score */
function updateScore() {
  if (!gameOver) {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
  }
}

/* game over */
function endGame() {
  gameOver = true;
  alert("💀 Game Over! Score: " + score);
  location.reload();
}

/* loops */
setInterval(updatePlayer, 20);
setInterval(createObstacle, 1500);
setInterval(updateScore, 100);

</script>

</body>
</html>
