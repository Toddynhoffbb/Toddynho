<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Geometry Dash PRO</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0a0a10;
  font-family: Arial;
  color: white;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: linear-gradient(#111, #000);
}

/* player */
#player {
  width: 40px;
  height: 40px;
  background: #00ffd5;
  position: absolute;
  bottom: 120px;
  left: 120px;
  box-shadow: 0 0 20px #00ffd5;
  border-radius: 6px;
}

/* chão */
#ground {
  position: absolute;
  bottom: 120px;
  width: 100%;
  height: 3px;
  background: #333;
}

/* spike */
.spike {
  width: 0;
  height: 0;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-bottom: 40px solid red;
  position: absolute;
  bottom: 120px;
  right: -50px;
  filter: drop-shadow(0 0 8px red);
}

#score {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 20px;
}
</style>
</head>

<body>

<div id="game">
  <div id="score">Score: 0</div>
  <div id="player"></div>
  <div id="ground"></div>
</div>

<script>

const player = document.getElementById("player");
const game = document.getElementById("game");

let velocity = 0;
let gravity = 0.7;
let posY = 120;
let jumping = false;

let score = 0;
let gameOver = false;

/* pulo */
function jump() {
  if (jumping) return;
  velocity = 13;
  jumping = true;
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});

document.addEventListener("click", jump);

/* física */
function updatePlayer() {
  velocity -= gravity;
  posY += velocity;

  if (posY <= 120) {
    posY = 120;
    jumping = false;
  }

  player.style.bottom = posY + "px";
}

/* spikes */
function createSpike() {
  if (gameOver) return;

  const spike = document.createElement("div");
  spike.classList.add("spike");
  game.appendChild(spike);

  let right = -50;

  function move() {
    if (gameOver) return;

    right += 6;
    spike.style.right = right + "px";

    // colisão simples
    if (
      right > window.innerWidth - 180 &&
      right < window.innerWidth - 120 &&
      posY < 160
    ) {
      endGame();
    }

    if (right > window.innerWidth + 50) {
      spike.remove();
    }
  }

  setInterval(move, 20);
}

/* score */
function updateScore() {
  if (!gameOver) {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
  }
}

/* game over */
function endGame() {
  gameOver = true;
  alert("💀 Game Over! Score: " + score);
  location.reload();
}

/* loops */
setInterval(updatePlayer, 20);
setInterval(createSpike, 1400);
setInterval(updateScore, 100);

</script>

</body>
</html>
