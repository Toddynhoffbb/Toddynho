<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Dino Run</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #f7f7f7;
  font-family: Arial;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: white;
  border-bottom: 3px solid #333;
}

/* dinossauro */
#dino {
  width: 40px;
  height: 40px;
  background: black;
  position: absolute;
  bottom: 50px;
  left: 80px;
}

/* cacto */
.obstacle {
  width: 20px;
  height: 40px;
  background: green;
  position: absolute;
  bottom: 50px;
  right: -20px;
}

/* chão */
.ground {
  position: absolute;
  bottom: 50px;
  width: 100%;
  height: 2px;
  background: #333;
}

#score {
  position: absolute;
  top: 20px;
  left: 20px;
}
</style>
</head>

<body>

<div id="game">
  <div id="score">Score: 0</div>
  <div id="dino"></div>
  <div class="ground"></div>
</div>

<script>

const dino = document.getElementById("dino");
const game = document.getElementById("game");

let isJumping = false;
let velocity = 0;
let gravity = 0.8;
let posY = 50;

let score = 0;
let gameOver = false;

/* pulo */
function jump() {
  if (isJumping) return;
  velocity = 12;
  isJumping = true;
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});

document.addEventListener("touchstart", jump);

/* física */
function updateDino() {
  velocity -= gravity;
  posY += velocity;

  if (posY <= 50) {
    posY = 50;
    isJumping = false;
    velocity = 0;
  }

  dino.style.bottom = posY + "px";
}

/* obstáculo */
function createObstacle() {
  if (gameOver) return;

  const obs = document.createElement("div");
  obs.classList.add("obstacle");
  game.appendChild(obs);

  let right = -20;

  function move() {
    if (gameOver) return;

    right += 6;
    obs.style.right = right + "px";

    // colisão simples
    if (right > window.innerWidth - 120 && right < window.innerWidth - 80 && posY < 80) {
      endGame();
    }

    if (right > window.innerWidth + 50) {
      obs.remove();
    }
  }

  setInterval(move, 20);
}

/* score */
function updateScore() {
  if (!gameOver) {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
  }
}

/* fim */
function endGame() {
  gameOver = true;
  alert("💀 Game Over! Score: " + score);
  location.reload();
}

/* loops */
setInterval(updateDino, 16);
setInterval(createObstacle, 1500);
setInterval(updateScore, 100);

</script>

</body>
</html>
